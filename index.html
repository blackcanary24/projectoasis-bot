<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Арт-медитация</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #2a2a3c;
            --text: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent: #89b4fa;
            --accent-soft: #b4befe;
            --danger: #f38ba8;
            --canvas-bg: #f5f0eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-left h1 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header-left span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .close-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:hover { background: rgba(255,255,255,0.1); }

        .canvas-container {
            flex: 1;
            position: relative;
            background: var(--canvas-bg);
            cursor: crosshair;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* Таймер */
        .timer-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--surface);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
            z-index: 10;
            font-size: 12px;
        }

        .timer-display {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            min-width: 44px;
            text-align: center;
        }

        .timer-display.warning { color: #fab387; animation: pulse 1.5s infinite; }
        .timer-display.timeout { color: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-toggle {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-toggle.active { background: var(--accent); color: var(--bg); }

        .timer-preset {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .timer-preset.active-preset {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            font-weight: 600;
        }

        /* Задания */
        .toast {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 18px;
            box-shadow: var(--shadow);
            z-index: 20;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            text-align: center;
            font-size: 14px;
            color: var(--accent-soft);
            line-height: 1.5;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-icon { font-size: 18px; display: block; margin-bottom: 4px; }

        /* Панель инструментов */
        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 10px 10px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid transparent;
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.1); }
        .tool-btn:active { transform: scale(0.92); }
        .tool-btn.active {
            border-color: var(--accent);
            background: rgba(137,180,250,0.12);
            color: var(--accent);
        }

        .brush-btn {
            font-size: 12px;
            padding: 0 8px;
            width: auto;
            gap: 3px;
            white-space: nowrap;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .color-btn:hover { transform: scale(1.15); }
        .color-btn.active-color { border-color: var(--text); transform: scale(1.1); }

        .size-slider {
            -webkit-appearance: none;
            width: 70px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            outline: none;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .size-label {
            font-size: 10px;
            color: var(--text-secondary);
            min-width: 20px;
            text-align: center;
        }

        .sound-toggle {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .sound-toggle.muted { color: var(--danger); opacity: 0.6; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h1>🎨 Арт-медитация</h1>
            <span>Рисуй • Дыши • Отпускай</span>
        </div>
        <button class="close-btn" id="closeBtn" title="Закрыть">✕</button>
    </div>

    <!-- CANVAS -->
    <div class="canvas-container" id="canvasContainer">
        <canvas id="drawCanvas"></canvas>

        <!-- TIMER -->
        <div class="timer-panel" id="timerPanel">
            <div class="timer-display" id="timerDisplay">03:00</div>
            <button class="timer-preset active-preset" data-seconds="180">3м</button>
            <button class="timer-preset" data-seconds="300">5м</button>
            <button class="timer-preset" data-seconds="600">10м</button>
            <button class="timer-toggle active" id="timerToggle" title="Вкл/Выкл таймер">⏯</button>
        </div>

        <!-- TOAST -->
        <div class="toast" id="toast">
            <span class="toast-icon">💭</span>
            <span id="toastText"></span>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <!-- Ряд 1: Кисти -->
        <div class="toolbar-row" id="brushRow">
            <button class="tool-btn brush-btn active" data-brush="pencil" title="Карандаш">✏️ Карандаш</button>
            <button class="tool-btn brush-btn" data-brush="pen" title="Тонкая ручка">🖊 Ручка</button>
            <button class="tool-btn brush-btn" data-brush="marker" title="Маркер">🖍 Маркер</button>
            <button class="tool-btn brush-btn" data-brush="charcoal" title="Уголь">🪶 Уголь</button>
            <button class="tool-btn brush-btn" data-brush="stroke" title="Мазок">🖌 Мазок</button>
            <button class="tool-btn" id="eraserTool" title="Ластик">🧹</button>
        </div>
        <!-- Ряд 2: Размер + Цвета -->
        <div class="toolbar-row">
            <span class="size-label">↔</span>
            <input type="range" class="size-slider" id="sizeSlider" min="1" max="40" value="3" title="Размер кисти">
            <span class="size-label" id="sizeValue">3</span>
            <span style="color:var(--text-secondary); margin:0 4px;">|</span>
            <button class="color-btn active-color" data-color="#2d3a1f" style="background:#2d3a1f;" title="Лесной"></button>
            <button class="color-btn" data-color="#4a5d23" style="background:#4a5d23;" title="Мох"></button>
            <button class="color-btn" data-color="#556b2f" style="background:#556b2f;" title="Оливковый"></button>
            <button class="color-btn" data-color="#6b705c" style="background:#6b705c;" title="Шалфей"></button>
            <button class="color-btn" data-color="#a5a58d" style="background:#a5a58d;" title="Полынь"></button>
            <button class="color-btn" data-color="#7f8c6b" style="background:#7f8c6b;" title="Хвоя"></button>
            <button class="color-btn" data-color="#c5c9a4" style="background:#c5c9a4;" title="Фисташка"></button>
            <button class="color-btn" data-color="#b7b7a4" style="background:#b7b7a4;" title="Пыльный шалфей"></button>
        </div>
        <!-- Ряд 3: Очистить + Звук -->
        <div class="toolbar-row">
            <button class="tool-btn" id="clearBtn" title="Очистить">🗑 Очистить</button>
            <button class="sound-toggle" id="soundToggle" title="Звук">🔊</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ==================== TELEGRAM INIT ====================
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#1e1e2e'); tg.setBackgroundColor('#1e1e2e'); }

        // ==================== DOM ====================
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerToggle = document.getElementById('timerToggle');
        const timerPanel = document.getElementById('timerPanel');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const eraserTool = document.getElementById('eraserTool');
        const clearBtn = document.getElementById('clearBtn');
        const soundToggle = document.getElementById('soundToggle');
        const closeBtn = document.getElementById('closeBtn');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const colorBtns = document.querySelectorAll('.color-btn');
        const brushBtns = document.querySelectorAll('.brush-btn');
        const timerPresets = document.querySelectorAll('.timer-preset');

        // ==================== STATE ====================
        let isDrawing = false;
        let isEraser = false;
        let currentBrush = 'pencil';
        let currentColor = '#2d3a1f';
        let brushSize = 3;
        let soundEnabled = true;
        let timerActive = true;
        let timerSeconds = 180;
        let timerInterval = null;
        let taskInterval = null;
        let toastTimeout = null;

        const tasks = [
            'Нарисуй тишину', 'Нарисуй свой страх в виде линии и преврати его в цветок',
            'Не отрывая руки, нарисуй путь своей мечты', 'Заполни точками всю свободную область',
            'Изобрази звук, который ты сейчас слышишь', 'Нарисуй, как выглядит спокойствие',
            'Проведи линию своего дыхания: вдох — вверх, выдох — вниз',
            'Нарисуй что-то, не глядя на холст', 'Преврати каракули в птицу',
            'Нарисуй круг и заполни его тем, что внутри тебя сейчас'
        ];

        // ==================== CANVAS ====================
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            ctx.drawImage(tempCanvas, 0, 0, rect.width, rect.height);
            applyBrushStyle();
        }

        function applyBrushStyle() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 1;

            if (isEraser) {
                ctx.strokeStyle = '#f5f0eb';
                ctx.lineWidth = brushSize * 6;
                ctx.globalAlpha = 1;
                return;
            }

            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;

            switch (currentBrush) {
                case 'pencil':
                    ctx.globalAlpha = 0.85;
                    ctx.lineWidth = brushSize * 0.9;
                    break;
                case 'pen':
                    ctx.globalAlpha = 0.95;
                    ctx.lineWidth = brushSize * 0.7;
                    break;
                case 'marker':
                    ctx.globalAlpha = 0.6;
                    ctx.lineWidth = brushSize * 1.5;
                    break;
                case 'charcoal':
                    ctx.globalAlpha = 0.7;
                    ctx.lineWidth = brushSize * 1.2;
                    break;
                case 'stroke':
                    ctx.globalAlpha = 0.5;
                    ctx.lineWidth = brushSize * 2.5;
                    break;
            }
        }

        function initCanvas() {
            resizeCanvas();
            ctx.fillStyle = '#f5f0eb';
            ctx.fillRect(0, 0, container.getBoundingClientRect().width, container.getBoundingClientRect().height);
            applyBrushStyle();
        }

        window.addEventListener('resize', resizeCanvas);
        initCanvas();

        // ==================== DRAWING ====================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if (soundEnabled) playDrawSound();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if (currentBrush === 'charcoal') {
                // Зернистость угля — дополнительные точки рядом
                const origAlpha = ctx.globalAlpha;
                const origWidth = ctx.lineWidth;
                ctx.globalAlpha = origAlpha * 0.3;
                ctx.lineWidth = origWidth * 0.4;
                ctx.strokeStyle = currentColor;
                for (let i = 0; i < 2; i++) {
                    ctx.beginPath();
                    ctx.moveTo(pos.x + (Math.random()-0.5)*6, pos.y + (Math.random()-0.5)*6);
                    ctx.lineTo(pos.x + (Math.random()-0.5)*6, pos.y + (Math.random()-0.5)*6);
                    ctx.stroke();
                }
                ctx.globalAlpha = origAlpha;
                ctx.lineWidth = origWidth;
                ctx.strokeStyle = currentColor;
            }
            if (soundEnabled) playDrawSound();
        }

        function stopDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.closePath();
            stopSound();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchcancel', stopDraw);

        // ==================== AUDIO ====================
        let audioCtx = null;
        let oscNode = null;
        let gainNode = null;
        let noiseNode = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playDrawSound() {
            if (!soundEnabled) return;
            initAudio();
            stopSound();

            const now = audioCtx.currentTime;
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);

            if (isEraser) {
                // Мягкое трение ластика — низкий шум
                noiseNode = audioCtx.createBufferSource();
                const bufferSize = audioCtx.sampleRate * 0.08;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * 0.3;
                noiseNode.buffer = buffer;
                noiseNode.loop = true;
                const lowpass = audioCtx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 200;
                noiseNode.connect(lowpass);
                lowpass.connect(gainNode);
                gainNode.gain.setValueAtTime(0.02, now);
                noiseNode.start(now);
            } else {
                // Мягкий шелест в зависимости от кисти
                let freq = 800;
                let vol = 0.012;
                switch (currentBrush) {
                    case 'pencil': freq = 1200; vol = 0.01; break;
                    case 'pen': freq = 900; vol = 0.008; break;
                    case 'marker': freq = 500; vol = 0.018; break;
                    case 'charcoal': freq = 300; vol = 0.022; break;
                    case 'stroke': freq = 200; vol = 0.025; break;
                }

                // Генератор шума с фильтром (шелест, а не писк)
                noiseNode = audioCtx.createBufferSource();
                const bufSize = audioCtx.sampleRate * 0.05;
                const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * 0.4;
                noiseNode.buffer = buf;
                noiseNode.loop = true;
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.value = freq;
                bandpass.Q.value = 0.4;
                noiseNode.connect(bandpass);
                bandpass.connect(gainNode);
                gainNode.gain.setValueAtTime(vol, now);
                noiseNode.start(now);
            }
        }

        function stopSound() {
            try {
                if (noiseNode) { noiseNode.stop(0); noiseNode.disconnect(); noiseNode = null; }
                if (oscNode) { oscNode.stop(0); oscNode.disconnect(); oscNode = null; }
                if (gainNode) { gainNode.disconnect(); gainNode = null; }
            } catch(e) {}
        }

        // ==================== TIMER ====================
        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplay.textContent = String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
            timerDisplay.classList.remove('warning','timeout');
            if (timerActive && timerSeconds <= 30 && timerSeconds > 0) timerDisplay.classList.add('warning');
            else if (timerActive && timerSeconds <= 0) timerDisplay.classList.add('timeout');
        }

        function startTimer() {
            stopTimer();
            if (!timerActive || timerSeconds <= 0) return;
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); }
                if (timerSeconds <= 0) { updateTimerDisplay(); showToast('Время вышло. Ты молодец, что уделил время себе ❤️'); }
            }, 1000);
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

        function resetTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerActive) startTimer();
        }

        timerToggle.addEventListener('click', () => {
            timerActive = !timerActive;
            timerToggle.classList.toggle('active', timerActive);
            timerPanel.classList.toggle('off', !timerActive);
            if (timerActive && timerSeconds > 0) startTimer();
            else { stopTimer(); timerDisplay.classList.remove('warning','timeout'); }
        });

        timerPresets.forEach(btn => {
            btn.addEventListener('click', () => {
                timerPresets.forEach(b => b.classList.remove('active-preset'));
                btn.classList.add('active-preset');
                stopTimer();
                resetTimer(parseInt(btn.dataset.seconds));
            });
        });

        setTimerActive(true);
        resetTimer(180);

        // ==================== TASKS ====================
        function showToast(text) {
            toastText.textContent = text;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 7000);
        }

        function startTaskCycle() {
            stopTaskCycle();
            taskInterval = setInterval(() => {
                if (timerActive && timerSeconds > 0) showToast(tasks[Math.floor(Math.random()*tasks.length)]);
            }, 45000);
        }
        function stopTaskCycle() { if (taskInterval) clearInterval(taskInterval); }
        startTaskCycle();

        // ==================== TOOLS ====================
        function selectBrush(brush) {
            currentBrush = brush;
            isEraser = false;
            brushBtns.forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-brush="${brush}"]`)?.classList.add('active');
            eraserTool.classList.remove('active');
            applyBrushStyle();
        }

        brushBtns.forEach(btn => {
            btn.addEventListener('click', () => selectBrush(btn.dataset.brush));
        });

        eraserTool.addEventListener('click', () => {
            isEraser = true;
            brushBtns.forEach(b => b.classList.remove('active'));
            eraserTool.classList.add('active');
            applyBrushStyle();
        });

        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorBtns.forEach(b => b.classList.remove('active-color'));
                btn.classList.add('active-color');
                currentColor = btn.dataset.color;
                if (!isEraser) {
                    isEraser = false;
                    eraserTool.classList.remove('active');
                    document.querySelector(`[data-brush="${currentBrush}"]`)?.classList.add('active');
                }
                applyBrushStyle();
            });
        });

        sizeSlider.addEventListener('input', () => {
            brushSize = parseInt(sizeSlider.value);
            sizeValue.textContent = brushSize;
            applyBrushStyle();
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('Очистить холст?')) {
                const w = container.getBoundingClientRect().width;
                const h = container.getBoundingClientRect().height;
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#f5f0eb';
                ctx.fillRect(0, 0, w, h);
            }
        });

        // ==================== SOUND ====================
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            stopSound();
            soundToggle.classList.toggle('muted', !soundEnabled);
            soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        });

        closeBtn.addEventListener('click', () => { if (tg) tg.close(); });

        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());
        document.body.addEventListener('touchmove', function(e) {
            if (e.target === canvas || canvas.contains(e.target)) e.preventDefault();
        }, { passive: false });

        console.log('🎨 Арт-медитация v2: 5 кистей, мягкий звук, размер кисти');
    </script>
</body>
</html>
