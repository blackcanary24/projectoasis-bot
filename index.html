<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis MVP</title>

<style>
:root{
--bg:#1c2a1f;
--surface:#26392b;
--accent:#a8cfa0;
--text:#eef5ea;
--canvas:#f7f2e8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
flex-direction:column;
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

header{
padding:14px 18px;
background:var(--surface);
border-bottom:1px solid rgba(255,255,255,0.08);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

header h1{
font-size:22px;
}

header p{
font-size:13px;
opacity:0.8;
margin-top:4px;
}

.timer-panel{
display:flex;
align-items:center;
gap:8px;
background:rgba(0,0,0,0.3);
padding:8px 12px;
border-radius:12px;
}

.timer-display{
font-size:18px;
font-weight:bold;
font-variant-numeric:tabular-nums;
min-width:44px;
text-align:center;
color:var(--accent);
}

.timer-preset{
border:none;
border-radius:6px;
padding:4px 8px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
font-size:11px;
transition:0.2s;
}

.timer-preset.active-preset{
background:var(--accent);
color:#1c2a1f;
font-weight:bold;
}

.timer-toggle{
border:none;
border-radius:6px;
width:30px;
height:30px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
font-size:14px;
display:flex;
align-items:center;
justify-content:center;
}

.timer-toggle.active{
background:var(--accent);
color:#1c2a1f;
}

.canvas-wrap{
flex:1;
position:relative;
background:var(--canvas);
}

canvas{
display:block;
width:100%;
height:100%;
touch-action:none;
}

.toolbar{
padding:12px;
background:var(--surface);
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
align-items:center;
}

button{
border:none;
border-radius:12px;
padding:10px 14px;
background:#344d39;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

button.active{
background:var(--accent);
color:#1c2a1f;
}

.color{
width:28px;
height:28px;
border-radius:50%;
border:2px solid white;
cursor:pointer;
transition:0.2s;
}

.color:hover{
transform:scale(1.1);
}

input[type="range"]{
width:120px;
}

.toast{
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
background:rgba(0,0,0,0.72);
padding:12px 18px;
border-radius:14px;
opacity:0;
transition:0.35s;
font-size:14px;
pointer-events:none;
}

.toast.show{
opacity:1;
}
</style>
</head>

<body>

<header>
<div>
<h1>🌿 Oasis</h1>
<p>Минималистичное пространство для творчества и концентрации</p>
</div>
<div class="timer-panel" id="timerPanel">
<div class="timer-display" id="timerDisplay">03:00</div>
<button class="timer-preset active-preset" data-s="180">3м</button>
<button class="timer-preset" data-s="300">5м</button>
<button class="timer-preset" data-s="600">10м</button>
<button class="timer-toggle active" id="timerToggle">⏯</button>
</div>
</header>

<div class="canvas-wrap">
<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>
</div>

<div class="toolbar">

<button class="brush active" data-brush="pencil">✏️ Карандаш</button>
<button class="brush" data-brush="marker">🖍 Маркер</button>
<button class="brush" data-brush="water">🖌 Акварель</button>

<button id="eraser">🧹 Ластик</button>

<input type="range" min="1" max="40" value="4" id="size">

<div class="color" data-color="#1f1f1f" style="background:#1f1f1f"></div>
<div class="color" data-color="#ffffff" style="background:#ffffff"></div>
<div class="color" data-color="#556b2f" style="background:#556b2f"></div>
<div class="color" data-color="#7f8c6b" style="background:#7f8c6b"></div>
<div class="color" data-color="#2f5d62" style="background:#2f5d62"></div>
<div class="color" data-color="#6d597a" style="background:#6d597a"></div>
<div class="color" data-color="#b56576" style="background:#b56576"></div>
<div class="color" data-color="#e56b6f" style="background:#e56b6f"></div>
<div class="color" data-color="#eaac8b" style="background:#eaac8b"></div>
<div class="color" data-color="#ddb892" style="background:#ddb892"></div>

<button id="soundBtn">🔊 Звук</button>
<button id="clearBtn">🗑 Очистить</button>

</div>

<script>

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let brush = 'pencil';
let color = '#1f1f1f';
let size = 4;
let eraser = false;
let soundEnabled = true;
let audioCtx = null;

// Таймер
let timerActive = true;
let timerSeconds = 180;
let timerInterval = null;

const tasks = [
'Нарисуй место, где тебе спокойно',
'Изобрази дождь',
'Нарисуй лес ночью',
'Нарисуй своё настроение',
'Создай абстракцию из линий',
'Нарисуй тишину',
'Изобрази уют',
'Нарисуй воспоминание',
'Создай персонажа сна'
];

function resizeCanvas(){

const dpr = window.devicePixelRatio || 1;

canvas.width = canvas.offsetWidth * dpr;
canvas.height = canvas.offsetHeight * dpr;

ctx.scale(dpr,dpr);

ctx.fillStyle = '#f7f2e8';
ctx.fillRect(0,0,canvas.offsetWidth,canvas.offsetHeight);

applyBrush();
}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

function applyBrush(){

ctx.lineCap = 'round';
ctx.lineJoin = 'round';

if(eraser){

ctx.globalAlpha = 1;
ctx.strokeStyle = '#f7f2e8';
ctx.lineWidth = size * 3;
return;
}

ctx.strokeStyle = color;

if(brush === 'pencil'){

ctx.globalAlpha = 0.9;
ctx.lineWidth = size;
}

if(brush === 'marker'){

ctx.globalAlpha = 0.35;
ctx.lineWidth = size * 2.5;
}

if(brush === 'water'){

ctx.globalAlpha = 0.12;
ctx.lineWidth = size * 5;
}
}

function getPos(e){

const rect = canvas.getBoundingClientRect();

return{
x:(e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
y:(e.touches ? e.touches[0].clientY : e.clientY) - rect.top
};
}

let lastSoundTime = 0;

function start(e){

drawing = true;

const p = getPos(e);

ctx.beginPath();
ctx.moveTo(p.x,p.y);

if(soundEnabled && Date.now() - lastSoundTime > 50){
playPencilSound();
lastSoundTime = Date.now();
}
}

function draw(e){

if(!drawing) return;

const p = getPos(e);

ctx.lineTo(p.x,p.y);
ctx.stroke();

if(brush === 'pencil' && !eraser){

ctx.save();

ctx.globalAlpha = 0.15;
ctx.fillStyle = color;

for(let i=0;i<2;i++){

const dx = (Math.random()-0.5) * size;
const dy = (Math.random()-0.5) * size;

ctx.beginPath();
ctx.arc(p.x+dx,p.y+dy,0.4,0,Math.PI*2);
ctx.fill();
}

ctx.restore();
}

if(soundEnabled && Date.now() - lastSoundTime > 50){
playPencilSound();
lastSoundTime = Date.now();
}
}

function stop(){

drawing = false;
ctx.closePath();
}

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stop);
canvas.addEventListener('mouseleave', stop);

canvas.addEventListener('touchstart', start);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stop);

function initAudio(){

if(!audioCtx){

audioCtx = new(window.AudioContext || window.webkitAudioContext)();
}
if(audioCtx.state === 'suspended'){
audioCtx.resume();
}
}

function playPencilSound(){

if(!soundEnabled) return;

initAudio();

const now = audioCtx.currentTime;

// Мягкий шелест карандаша — короткий шум с фильтрацией
const bufferSize = Math.floor(audioCtx.sampleRate * 0.06);
const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const data = buffer.getChannelData(0);

for(let i = 0; i < bufferSize; i++){
// Сухой шум с быстрым затуханием
const t = i / audioCtx.sampleRate;
const noise = (Math.random() * 2 - 1) * 0.4;
data[i] = noise * Math.exp(-t * 180);
}

const source = audioCtx.createBufferSource();
source.buffer = buffer;

// Фильтр — пропускаем только высокие частоты (шелест бумаги)
const bandpass = audioCtx.createBiquadFilter();
bandpass.type = 'bandpass';
bandpass.frequency.value = eraser ? 200 : 2200;
bandpass.Q.value = eraser ? 0.3 : 0.9;

const gain = audioCtx.createGain();
gain.gain.setValueAtTime(eraser ? 0.03 : 0.025, now);
gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);

source.connect(bandpass);
bandpass.connect(gain);
gain.connect(audioCtx.destination);

source.start(now);
source.stop(now + 0.08);

// Автоочистка
setTimeout(() => {
try { source.disconnect(); bandpass.disconnect(); gain.disconnect(); } catch(e) {}
}, 150);
}

// ========== ТАЙМЕР ==========
function updateTimerDisplay(){
const m = Math.floor(timerSeconds / 60);
const s = timerSeconds % 60;
document.getElementById('timerDisplay').textContent =
String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function startTimer(){
stopTimer();
if(!timerActive || timerSeconds <= 0) return;
timerInterval = setInterval(() => {
if(timerSeconds > 0){
timerSeconds--;
updateTimerDisplay();
}
if(timerSeconds <= 0){
showToast('Время вышло. Ты молодец, что уделил время себе 🌿');
}
}, 1000);
}

function stopTimer(){
if(timerInterval){
clearInterval(timerInterval);
timerInterval = null;
}
}

document.getElementById('timerToggle').addEventListener('click', function(){
timerActive = !timerActive;
this.classList.toggle('active', timerActive);
if(timerActive && timerSeconds > 0){
startTimer();
} else {
stopTimer();
}
});

document.querySelectorAll('.timer-preset').forEach(btn => {
btn.addEventListener('click', function(){
document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active-preset'));
this.classList.add('active-preset');
timerSeconds = parseInt(this.dataset.s);
updateTimerDisplay();
stopTimer();
if(timerActive) startTimer();
});
});

// Запуск таймера
updateTimerDisplay();
startTimer();

// ========== ИНСТРУМЕНТЫ ==========
document.querySelectorAll('.brush')
.forEach(btn=>{

btn.addEventListener('click',()=>{

eraser = false;

brush = btn.dataset.brush;

document.querySelectorAll('.brush')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

applyBrush();
});
});

document.getElementById('eraser')
.addEventListener('click',()=>{

eraser = true;
applyBrush();
});

document.querySelectorAll('.color')
.forEach(c=>{

c.addEventListener('click',()=>{

color = c.dataset.color;
eraser = false;

applyBrush();
});
});

document.getElementById('size')
.addEventListener('input',(e)=>{

size = e.target.value;

applyBrush();
});

document.getElementById('soundBtn')
.addEventListener('click',()=>{

soundEnabled = !soundEnabled;

document.getElementById('soundBtn').textContent =
soundEnabled
? '🔊 Звук'
: '🔇 Без звука';
});

document.getElementById('clearBtn')
.addEventListener('click',()=>{

ctx.fillStyle = '#f7f2e8';

ctx.fillRect(
0,
0,
canvas.offsetWidth,
canvas.offsetHeight
);

showToast('Холст очищен 🌿');
});

function showToast(text){

const toast = document.getElementById('toast');

toast.textContent = text;

toast.classList.add('show');

setTimeout(()=>{

toast.classList.remove('show');

},4000);
}

// Задания каждые 45 секунд
setInterval(()=>{
const task = tasks[Math.floor(Math.random()*tasks.length)];
showToast(task);
}, 45000);

</script>

</body>
</html>
