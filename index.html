<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Арт-медитация</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #2a2a3c;
            --text: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent: #89b4fa;
            --accent-soft: #b4befe;
            --danger: #f38ba8;
            --canvas-bg: #f5f0eb;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden; overscroll-behavior: none;
        }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; background: var(--surface);
            border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
        }
        .header-left h1 { font-size: 15px; font-weight: 600; }
        .header-left span { font-size: 11px; color: var(--text-secondary); }
        .close-btn {
            width: 30px; height: 30px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.05); color: var(--text-secondary);
            font-size: 16px; cursor: pointer;
        }

        .canvas-container {
            flex: 1; position: relative; background: var(--canvas-bg);
            cursor: crosshair; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        .timer-panel {
            position: absolute; top: 10px; right: 10px;
            background: var(--surface); border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 6px;
            z-index: 10; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .timer-display {
            font-size: 18px; font-weight: 700; color: var(--accent);
            min-width: 44px; text-align: center;
        }
        .timer-display.warning { color: #fab387; }
        .timer-display.timeout { color: var(--danger); }
        .timer-toggle {
            width: 30px; height: 30px; border-radius: 6px; border: none;
            background: rgba(255,255,255,0.08); color: var(--text);
            cursor: pointer; font-size: 14px;
        }
        .timer-toggle.active { background: var(--accent); color: var(--bg); }
        .timer-preset {
            font-size: 10px; padding: 3px 6px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15); background: transparent;
            color: var(--text-secondary); cursor: pointer;
        }
        .timer-preset.active-preset {
            background: var(--accent); border-color: var(--accent);
            color: var(--bg); font-weight: 600;
        }

        .toast {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: var(--surface); border-radius: 14px; padding: 14px 18px;
            z-index: 20; opacity: 0; transform: translateY(10px);
            transition: opacity 0.4s, transform 0.4s;
            pointer-events: none; text-align: center;
            font-size: 14px; color: var(--accent-soft);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        .toolbar {
            display: flex; flex-direction: column; gap: 6px;
            padding: 8px 10px 10px; background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
        }
        .toolbar-row {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; justify-content: center;
        }

        .brush-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .brush-btn {
            width: 40px; height: 40px; border-radius: 10px;
            border: 2px solid transparent; background: rgba(255,255,255,0.05);
            color: var(--text-secondary); cursor: pointer;
            font-size: 16px; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s;
        }
        .brush-btn:active { transform: scale(0.92); }
        .brush-btn.active {
            border-color: var(--accent) !important;
            background: rgba(137,180,250,0.15) !important;
            color: var(--accent) !important;
        }
        .brush-label {
            font-size: 9px; color: var(--text-secondary); text-align: center;
        }

        .palette-btn {
            background: rgba(255,255,255,0.08); font-size: 18px;
            width: 38px; height: 38px; border-radius: 10px;
            border: 2px solid transparent; cursor: pointer; color: var(--text);
        }
        .palette-btn.open {
            border-color: var(--accent); background: rgba(137,180,250,0.15);
        }

        .palette-popup {
            display: none; flex-wrap: wrap; gap: 6px;
            padding: 8px; background: rgba(0,0,0,0.3);
            border-radius: 10px; justify-content: center;
        }
        .palette-popup.show { display: flex; }

        .color-dot {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.15s;
        }
        .color-dot:active { transform: scale(1.2); }
        .color-dot.active-dot {
            border-color: #fff !important;
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .size-row {
            display: flex; align-items: center; gap: 4px;
            color: var(--text-secondary); font-size: 11px;
        }
        .size-slider {
            -webkit-appearance: none; width: 70px; height: 4px;
            border-radius: 2px; background: rgba(255,255,255,0.2);
            outline: none;
        }
        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
        }

        .sound-toggle {
            width: 38px; height: 38px; border-radius: 10px;
            border: none; background: rgba(255,255,255,0.05);
            cursor: pointer; font-size: 16px; color: var(--text-secondary);
        }
        .sound-toggle.muted { color: var(--danger); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>🎨 Арт-медитация</h1>
            <span>Рисуй • Дыши • Отпускай</span>
        </div>
        <button class="close-btn" id="closeBtn">✕</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="drawCanvas"></canvas>
        <div class="timer-panel" id="timerPanel">
            <div class="timer-display" id="timerDisplay">03:00</div>
            <button class="timer-preset active-preset" data-s="180">3м</button>
            <button class="timer-preset" data-s="300">5м</button>
            <button class="timer-preset" data-s="600">10м</button>
            <button class="timer-toggle active" id="timerToggle">⏯</button>
        </div>
        <div class="toast" id="toast"><span id="toastText"></span></div>
    </div>

    <div class="toolbar">
        <div class="toolbar-row">
            <div class="brush-wrap">
                <button class="brush-btn active" data-brush="pencil">✏️</button>
                <span class="brush-label">Карандаш</span>
            </div>
            <div class="brush-wrap">
                <button class="brush-btn" data-brush="marker">🖍</button>
                <span class="brush-label">Маркер</span>
            </div>
            <div class="brush-wrap">
                <button class="brush-btn" data-brush="stroke">🖌</button>
                <span class="brush-label">Мазок</span>
            </div>
            <div class="brush-wrap">
                <button class="brush-btn" id="eraserTool">🧹</button>
                <span class="brush-label">Ластик</span>
            </div>
        </div>

        <div class="toolbar-row">
            <button class="palette-btn" id="paletteToggle">🎨</button>
            <div class="size-row">
                <span>↔</span>
                <input type="range" class="size-slider" id="sizeSlider" min="1" max="40" value="3">
                <span id="sizeValue">3</span>
            </div>
            <button class="tool-btn brush-btn" id="clearBtn" style="width:38px;height:38px;">🗑</button>
            <button class="sound-toggle" id="soundToggle">🔊</button>
        </div>

        <div class="palette-popup" id="palettePopup">
            <span class="color-dot active-dot" data-color="#2d3a1f" style="background:#2d3a1f;"></span>
            <span class="color-dot" data-color="#4a5d23" style="background:#4a5d23;"></span>
            <span class="color-dot" data-color="#556b2f" style="background:#556b2f;"></span>
            <span class="color-dot" data-color="#6b705c" style="background:#6b705c;"></span>
            <span class="color-dot" data-color="#a5a58d" style="background:#a5a58d;"></span>
            <span class="color-dot" data-color="#7f8c6b" style="background:#7f8c6b;"></span>
            <span class="color-dot" data-color="#c5c9a4" style="background:#c5c9a4;"></span>
            <span class="color-dot" data-color="#b7b7a4" style="background:#b7b7a4;"></span>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        let isDrawing = false;
        let isEraser = false;
        let currentBrush = 'pencil';
        let currentColor = '#2d3a1f';
        let brushSize = 3;
        let soundEnabled = true;
        let timerActive = true;
        let timerSeconds = 180;
        let timerInterval = null;
        let taskInterval = null;
        let toastTimeout = null;

        const tasks = [
            'Нарисуй тишину', 'Нарисуй свой страх и преврати его в цветок',
            'Не отрывая руки, нарисуй путь мечты', 'Заполни точками всё пространство',
            'Изобрази звук, который слышишь', 'Нарисуй, как выглядит спокойствие'
        ];

        // ========== CANVAS ==========
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const temp = document.createElement('canvas');
            const tctx = temp.getContext('2d');
            temp.width = canvas.width; temp.height = canvas.height;
            tctx.drawImage(canvas, 0, 0);
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            ctx.drawImage(temp, 0, 0, rect.width, rect.height);
            applyStyle();
        }

        function applyStyle() {
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.globalAlpha = 1;
            if (isEraser) {
                ctx.strokeStyle = '#f5f0eb';
                ctx.lineWidth = brushSize * 5;
                return;
            }
            ctx.strokeStyle = currentColor;
            if (currentBrush === 'pencil') {
                // Тонкая линия с лёгкой текстурой
                ctx.globalAlpha = 0.8;
                ctx.lineWidth = brushSize * 0.8;
            } else if (currentBrush === 'marker') {
                // Широкая, полупрозрачная
                ctx.globalAlpha = 0.45;
                ctx.lineWidth = brushSize * 2;
            } else if (currentBrush === 'stroke') {
                // Очень широкая, очень прозрачная (акварель)
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = brushSize * 4;
            }
        }

        function applyTexture(x, y) {
            if (isEraser) return;
            if (currentBrush === 'pencil') {
                // Лёгкие точки вокруг линии для текстуры карандаша
                const origAlpha = ctx.globalAlpha;
                ctx.globalAlpha = origAlpha * 0.5;
                ctx.fillStyle = currentColor;
                for (let i = 0; i < 3; i++) {
                    const dx = (Math.random() - 0.5) * brushSize * 1.5;
                    const dy = (Math.random() - 0.5) * brushSize * 1.5;
                    ctx.beginPath();
                    ctx.arc(x + dx, y + dy, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = origAlpha;
            }
        }

        function initCanvas() {
            resizeCanvas();
            ctx.fillStyle = '#f5f0eb';
            ctx.fillRect(0, 0, container.getBoundingClientRect().width, container.getBoundingClientRect().height);
            applyStyle();
        }
        window.addEventListener('resize', resizeCanvas);
        initCanvas();

        // ========== DRAWING ==========
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        let lastSoundTime = 0;

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if (soundEnabled && Date.now() - lastSoundTime > 60) {
                playTick();
                lastSoundTime = Date.now();
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            applyTexture(p.x, p.y);
            if (soundEnabled && Date.now() - lastSoundTime > 60) {
                playTick();
                lastSoundTime = Date.now();
            }
        }

        function stopDraw() {
            isDrawing = false;
            ctx.closePath();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchcancel', stopDraw);

        // ========== ЗВУК: мягкий тон (как постукивание по дереву/бумаге) ==========
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTick() {
            if (!soundEnabled) return;
            initAudio();
            const now = audioCtx.currentTime;

            // Создаём короткий, мягкий тон — как касание кисточки
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // Частота разная для разных кистей
            let freq = 600;
            if (isEraser) freq = 200;
            else if (currentBrush === 'pencil') freq = 800;
            else if (currentBrush === 'marker') freq = 400;
            else if (currentBrush === 'stroke') freq = 250;

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.3, now + 0.08);

            gain.gain.setValueAtTime(0.04, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 0.12);

            // Автоочистка
            setTimeout(() => {
                try { osc.disconnect(); gain.disconnect(); } catch(e) {}
            }, 200);
        }

        // ========== TIMER ==========
        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            document.getElementById('timerDisplay').textContent =
                String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function startTimer() {
            stopTimer();
            if (!timerActive || timerSeconds <= 0) return;
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); }
                if (timerSeconds <= 0) showToast('Время вышло. Ты молодец ❤️');
            }, 1000);
        }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

        document.getElementById('timerToggle').addEventListener('click', function() {
            timerActive = !timerActive;
            this.classList.toggle('active', timerActive);
            if (timerActive && timerSeconds > 0) startTimer();
            else stopTimer();
        });

        document.querySelectorAll('.timer-preset').forEach(b => {
            b.addEventListener('click', function() {
                document.querySelectorAll('.timer-preset').forEach(x => x.classList.remove('active-preset'));
                this.classList.add('active-preset');
                timerSeconds = parseInt(this.dataset.s);
                updateTimerDisplay();
                stopTimer();
                if (timerActive) startTimer();
            });
        });

        // ========== TASKS ==========
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => t.classList.remove('show'), 7000);
        }
        function startTasks() {
            stopTasks();
            taskInterval = setInterval(() => {
                if (timerActive && timerSeconds > 0)
                    showToast(tasks[Math.floor(Math.random() * tasks.length)]);
            }, 45000);
        }
        function stopTasks() { if (taskInterval) clearInterval(taskInterval); }

        // ========== BRUSH SWITCHING ==========
        const brushBtns = document.querySelectorAll('[data-brush]');
        const eraserBtn = document.getElementById('eraserTool');

        brushBtns.forEach(b => {
            b.addEventListener('click', () => {
                isEraser = false;
                currentBrush = b.dataset.brush;
                brushBtns.forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                if (eraserBtn) eraserBtn.classList.remove('active');
                applyStyle();
            });
        });

        eraserBtn.addEventListener('click', () => {
            isEraser = true;
            brushBtns.forEach(x => x.classList.remove('active'));
            eraserBtn.classList.add('active');
            applyStyle();
        });

        // ========== PALETTE ==========
        const paletteToggle = document.getElementById('paletteToggle');
        const palettePopup = document.getElementById('palettePopup');
        const colorDots = document.querySelectorAll('.color-dot');

        paletteToggle.addEventListener('click', () => {
            palettePopup.classList.toggle('show');
            paletteToggle.classList.toggle('open');
        });

        colorDots.forEach(dot => {
            dot.addEventListener('click', () => {
                colorDots.forEach(d => d.classList.remove('active-dot'));
                dot.classList.add('active-dot');
                currentColor = dot.dataset.color;
                if (!isEraser) applyStyle();
                palettePopup.classList.remove('show');
                paletteToggle.classList.remove('open');
            });
        });

        // ========== SIZE ==========
        document.getElementById('sizeSlider').addEventListener('input', function() {
            brushSize = parseInt(this.value);
            document.getElementById('sizeValue').textContent = brushSize;
            applyStyle();
        });

        // ========== CLEAR ==========
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Очистить холст?')) {
                const w = container.getBoundingClientRect().width;
                const h = container.getBoundingClientRect().height;
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#f5f0eb';
                ctx.fillRect(0, 0, w, h);
            }
        });

        // ========== SOUND ==========
        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.classList.toggle('muted', !soundEnabled);
            this.textContent = soundEnabled ? '🔊' : '🔇';
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            if (tg) tg.close();
        });

        document.body.addEventListener('touchmove', e => {
            if (e.target === canvas || canvas.contains(e.target)) e.preventDefault();
        }, { passive: false });

        startTimer();
        startTasks();
        updateTimerDisplay();

        console.log('✅ Арт-медитация готова: 3 кисти с текстурой, мягкий звук');
    </script>
</body>
</html>
